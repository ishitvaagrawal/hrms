services:
  db:
    image: postgres:15
    container_name: hrms_db
    restart: always
    env_file:
      - backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: hrms_backend
    depends_on:
      - db
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --ws-ping-interval 20 --ws-ping-timeout 20

  frontend:
    build: ./frontend
    container_name: hrms_frontend
    depends_on:
      - backend
    env_file:
      - frontend/.env
    ports:
      - "3000:3000"
    command: npm run dev

volumes:
  postgres_data:
